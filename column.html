<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Column | nito - いいモノが自然に広まる仕組みをつくる</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;800;900&family=Noto+Sans+JP:wght@700;900&family=Outfit:wght@700;800&display=swap" rel="stylesheet">
    <style>
        /* Base Styles */
        :root {
            --color-bg: #ffffff;
            --color-text: #1a1a1a;
            --color-text-light: #666666;
            --color-primary: #ff9f43;
            /* Main Orange */
            --color-primary-deep: #e67e22;
            /* Deep Orange for emphasis */
            --color-secondary: #ff8c00;
            /* Strong Orange */
            --color-accent: #ff7f50;
            /* Coral Orange for highlights */
            --color-card-bg: #fffbf5;
            /* Very light warm beige/orange for depth */
            --color-border: #f5f5f5;
            --width-max: 1200px;
            --section-gap: 80px;

            /* Fonts */
            --font-heading-en: 'Montserrat', sans-serif;
            --font-heading-jp: 'Noto Sans JP', sans-serif;
            --font-body: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font-body);
            background-color: var(--color-bg);
            color: var(--color-text);
            line-height: 1.8;
            letter-spacing: 0.05em;
            overflow-x: hidden;
        }

        h1,
        h2,
        h3,
        .logo,
        .btn-contact,
        .vision-band {
            font-family: var(--font-heading-jp);
        }

        .sec-title {
            font-family: var(--font-heading-en);
        }

        a {
            text-decoration: none;
            color: inherit;
            transition: opacity 0.3s;
        }

        a:hover {
            opacity: 0.7;
        }

        /* Layout */
        .container {
            max-width: var(--width-max);
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Animations Styles */
        .ani-fade-top {
            opacity: 0;
            transform: translateY(-20px);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        .ani-fade-bottom {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 1s ease, transform 1s ease;
        }

        .ani-show-up {
            opacity: 0;
            transform: scale(0.95);
            transition: opacity 1s ease, transform 1s ease;
        }

        .animated {
            opacity: 1 !important;
            transform: translate(0) scale(1) !important;
        }

        /* Floating Header */
        .header-wrapper {
            position: sticky;
            top: 20px;
            z-index: 1000;
            width: 95%;
            max-width: 1100px;
            margin: 0 auto;
        }

        header {
            background-color: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 30px;
            border-radius: 50px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: var(--color-text);
            letter-spacing: 0.1em;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 24px;
            font-size: 14px;
            font-weight: bold;
        }

        .btn-contact {
            background-color: var(--color-secondary);
            color: white;
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: bold;
            transition: transform 0.2s, background-color 0.2s;
        }

        .btn-contact:hover {
            background-color: var(--color-primary);
        }

        /* Hamburger Menu */
        .hamburger {
            display: none;
            cursor: pointer;
            width: 30px;
            height: 20px;
            position: relative;
            z-index: 1001;
        }

        .hamburger span {
            display: block;
            width: 100%;
            height: 2px;
            background-color: var(--color-text);
            position: absolute;
            transition: all 0.3s ease;
        }

        .hamburger span:nth-child(1) { top: 0; }
        .hamburger span:nth-child(2) { top: 9px; }
        .hamburger span:nth-child(3) { top: 18px; }

        .hamburger.active span:nth-child(1) {
            transform: translateY(9px) rotate(45deg);
        }
        .hamburger.active span:nth-child(2) {
            opacity: 0;
        }
        .hamburger.active span:nth-child(3) {
            transform: translateY(-9px) rotate(-45deg);
        }

        /* Footer */
        footer {
            background-color: #fdfdfd;
            padding: 80px 0;
            border-top: 1px solid #eee;
            margin-top: 100px;
        }

        .footer-inner {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 40px;
            max-width: var(--width-max);
            margin: 0 auto;
            padding: 0 20px;
        }

        .footer-left {
            display: flex;
            flex-direction: column;
            gap: 30px;
            flex-shrink: 0;
        }

        .footer-logo {
            font-size: 32px;
            font-weight: bold;
            display: block;
            font-family: var(--font-heading-jp);
        }

        .footer-sns {
            display: flex;
            gap: 12px;
        }

        .sns-icon {
            width: 28px;
            height: 28px;
            background-color: #000;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            font-size: 10px;
            font-weight: bold;
        }

        .footer-center {
            display: flex;
            gap: 60px;
        }

        .footer-nav-col {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .footer-nav-title {
            font-weight: bold;
            font-size: 16px;
            color: #000;
            margin-bottom: 20px;
            display: block;
            text-decoration: none;
        }

        .footer-nav-links {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .footer-nav-links a {
            color: #999;
            font-size: 14px;
            font-weight: bold;
        }

        .footer-nav-column-single {
            font-weight: bold;
            font-size: 15px;
            color: #333;
        }

        .footer-right {
            flex-shrink: 0;
            width: 360px;
        }

        .footer-contact-box {
            background-color: var(--color-secondary);
            color: white;
            padding: 40px 30px;
            border-radius: 20px;
            text-align: left;
            text-decoration: none;
            display: block;
            transition: transform 0.2s;
        }

        .footer-contact-box:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 30px rgba(255, 140, 0, 0.2);
        }

        .footer-contact-title {
            font-size: 42px;
            font-weight: bold;
            margin-bottom: 20px;
            display: block;
            font-family: var(--font-heading-jp);
            letter-spacing: 0.05em;
        }

        .footer-contact-desc {
            font-size: 13px;
            line-height: 1.6;
            display: block;
            opacity: 0.9;
        }

        .mobile-footer-sns {
            display: none;
        }

        .nav-overlay {
            position: fixed;
            top: 20px;
            left: 5%;
            width: 90%;
            max-height: 90vh;
            background-color: #fff;
            z-index: 2000;
            padding: 80px 30px 40px;
            display: flex;
            flex-direction: column;
            gap: 40px;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-20px);
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            overflow-y: auto;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }

        .nav-overlay.active {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .nav-overlay-backdrop {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.3);
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s ease;
        }

        .nav-overlay-backdrop.active {
            opacity: 1;
            visibility: visible;
        }

        .nav-close {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-close::before, .nav-close::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 2px;
            background-color: var(--color-text);
        }

        .nav-close::before { transform: rotate(45deg); }
        .nav-close::after { transform: rotate(-45deg); }

        .nav-overlay-contact {
            margin-bottom: 20px;
        }

        .nav-overlay-contact .btn-contact {
            display: block;
            text-align: center;
            font-size: 18px;
            padding: 16px;
        }

        .nav-overlay-links {
            display: flex;
            flex-direction: column;
            gap: 32px;
        }

        .nav-overlay-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .nav-overlay-title {
            font-size: 20px;
            font-weight: 900;
            color: var(--color-text);
            font-family: var(--font-heading-jp);
        }

        .nav-overlay-sublinks {
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding-left: 0;
            border-left: none;
        }

        .nav-overlay-sublinks a {
            font-size: 15px;
            color: var(--color-text-light);
            font-weight: bold;
        }

        .nav-overlay-single {
            font-size: 20px;
            font-weight: 900;
            color: var(--color-text);
            font-family: var(--font-heading-jp);
        }

        .nav-overlay-sns {
            margin-top: auto;
            display: flex;
            gap: 16px;
            padding-top: 40px;
        }

        /* Responsive Styles */
        @media (max-width: 1024px) {
            .nav-links {
                display: none;
            }

            .hamburger {
                display: block;
            }

            .footer-inner {
                flex-direction: column;
                gap: 40px;
                align-items: flex-start; /* Back to left align */
                text-align: left; /* Back to left align */
            }

            .footer-left {
                order: 1; /* Company name first */
                align-items: flex-start;
                gap: 20px;
            }

            .footer-center {
                order: 2; /* Navigation second */
                flex-direction: column;
                gap: 32px;
                padding-top: 0;
            }

            .mobile-footer-sns {
                order: 3; /* SNS icons third */
                display: flex !important;
                justify-content: flex-start;
                gap: 16px;
                margin: 0;
            }

            .footer-right {
                order: 4; /* Contact button last */
                width: 100%;
            }

            .footer-nav-col {
                align-items: flex-start;
            }

            .footer-nav-links {
                align-items: flex-start;
            }

            .footer-left .pc-footer-sns {
                display: none;
            }

            .column-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .sec-title {
                font-size: 60px;
            }

            .column-hero {
                padding: 120px 0 60px;
            }
        }

        @media (max-width: 600px) {
            .footer-center {
                flex-direction: column;
                gap: 40px;
            }

            .column-grid {
                grid-template-columns: 1fr;
            }
        }

        [id] {
            scroll-margin-top: 100px;
        }

        /* Column Page Styles */
        .column-hero {
            padding: 160px 0 80px;
            text-align: center;
        }

        .sec-subtitle {
            font-size: 18px;
            font-weight: bold;
            color: #444;
            display: block;
            margin-bottom: 5px;
        }

        .sec-title {
            font-size: 80px;
            font-weight: 600;
            background: linear-gradient(to right, var(--color-primary), #ffce6d);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
            line-height: 1;
            margin-bottom: 20px;
            letter-spacing: normal;
            text-transform: capitalize;
            font-family: var(--font-heading-en);
        }

        /* Filter Buttons */
        .category-filter {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-bottom: 60px;
            flex-wrap: wrap;
        }

        .filter-btn {
            background-color: transparent;
            border: 1px solid var(--color-border);
            padding: 8px 24px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: bold;
            color: var(--color-text-light);
            cursor: pointer;
            transition: all 0.3s;
        }

        .filter-btn:hover {
            border-color: var(--color-primary);
            color: var(--color-primary);
        }

        .filter-btn.active {
            background-color: var(--color-primary);
            border-color: var(--color-primary);
            color: white;
        }

        .coming-soon-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px 20px 80px;
            margin-bottom: var(--section-gap);
            text-align: center;
        }

        .coming-soon-label {
            font-family: var(--font-heading-en);
            font-size: 72px;
            font-weight: 800;
            color: #cccccc;
            line-height: 1;
            margin-bottom: 24px;
            letter-spacing: normal;
        }

        .coming-soon-text {
            font-size: 16px;
            color: var(--color-text-light);
            font-weight: bold;
            line-height: 1.8;
        }

        @media (max-width: 768px) {
            .coming-soon-label {
                font-size: 48px;
            }
        }

        /* Footer */
        footer {
            background-color: #fdfdfd;
            padding: 80px 0;
            border-top: 1px solid #eee;
            margin-top: 100px;
        }
    </style>
</head>

<body>
    <!-- Header -->
    <div class="header-wrapper ani-fade-top">
        <header>
            <a href="index.html" class="logo">nito</a>
            <div class="nav-links">
                <a href="index.html#about">わたしたちについて</a>

            </div>
            <div class="hamburger" id="hamburger">
                <span></span>

                <span></span>
            </div>
        </header>
    </div>

    <!-- Mobile Navigation Overlay -->
    <div class="nav-overlay-backdrop" id="nav-overlay-backdrop"></div>
    <div class="nav-overlay" id="nav-overlay">
        <div class="nav-close" id="nav-close"></div>
        <div class="nav-overlay-contact">
            <a href="contact.html" class="btn-contact">相談する</a>
        </div>
        
        <div class="nav-overlay-links">
            <div class="nav-overlay-group">
                <span class="nav-overlay-title">わたしたちについて</span>
                <div class="nav-overlay-sublinks">
                    <a href="index.html#about">ビジョン</a>

                </div>
            </div>
            
            <div class="nav-overlay-group">
                <span class="nav-overlay-title">サービス</span>
                <div class="nav-overlay-sublinks">
                    <a href="index.html#service">AI検索対策</a>

                </div>
            </div>
            
            <a href="column.html" class="nav-overlay-single">コラム</a>
            <a href="privacy.html" class="nav-overlay-single">プライバシーポリシー</a>
        </div>


    </div>

    <div class="container">
        <div class="column-hero ani-show-up">
            <span class="sec-subtitle">コラム</span>
            <h1 class="sec-title">Column</h1>
        </div>


        <div class="coming-soon-wrap ani-show-up">
            <p class="coming-soon-label">Coming Soon</p>
            <p class="coming-soon-text">コラム記事を準備中です。<br>近日公開予定ですので、もうしばらくお待ちください。</p>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <div class="footer-inner">
            <div class="footer-left">
                <a href="index.html" class="footer-logo">nito</a>

            </div>

            <div class="footer-center">
                <div class="footer-nav-col">
                    <div class="footer-nav-title">わたしたちについて</div>
                    <div class="footer-nav-links">
                        <a href="index.html#about">ビジョン</a>
                        <a href="#">メンバー</a>
                    </div>
                </div>
                <div class="footer-nav-col">
                    <div class="footer-nav-title">サービス</div>
                    <div class="footer-nav-links">
                        <a href="index.html#service">AI検索対策</a>
                        <a href="index.html#service">ブランド戦略</a>
                    </div>
                </div>
                <div class="footer-nav-col">
                    <a href="column.html" class="footer-nav-title">コラム</a>
                    <div class="footer-nav-links">
                        <a href="privacy.html">プライバシーポリシー</a>
                    </div>
                </div>
            </div>



            <div class="footer-right">
                <a href="contact.html" class="footer-contact-box">
                    <span class="footer-contact-title">相談する</span>
                    <span class="footer-contact-desc">
                        マーケティングやその他サービスのご連絡は<br>こちらからお気軽に問い合わせください
                    </span>
                </a>
            </div>
        </div>
    </footer>

    <script>
        const observerOptions = { root: null, rootMargin: '0px', threshold: 0.15 };
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('animated');
                }
            });
        }, observerOptions);

        const animatedElements = document.querySelectorAll('.ani-fade-top, .ani-fade-bottom, .ani-show-up');
        animatedElements.forEach(el => observer.observe(el));

        window.addEventListener('load', () => {
            document.querySelector('.header-wrapper').classList.add('animated');
        });

        // Hamburger Menu Toggle
        const hamburger = document.getElementById('hamburger');
        const navOverlay = document.getElementById('nav-overlay');
        const navOverlayBackdrop = document.getElementById('nav-overlay-backdrop');
        const navClose = document.getElementById('nav-close');
        const overlayLinks = navOverlay.querySelectorAll('a');

        const toggleMenu = () => {
            const isActive = navOverlay.classList.toggle('active');
            navOverlayBackdrop.classList.toggle('active');
            hamburger.classList.toggle('active');
            document.body.style.overflow = isActive ? 'hidden' : '';
        };

        hamburger.addEventListener('click', toggleMenu);
        navClose.addEventListener('click', toggleMenu);
        navOverlayBackdrop.addEventListener('click', toggleMenu);

        overlayLinks.forEach(link => {
            link.addEventListener('click', () => {
                if (navOverlay.classList.contains('active')) {
                    toggleMenu();
                }
            });
        });

        // Filtering Logic
        const filterButtons = document.querySelectorAll('.filter-btn');
        const articleCards = document.querySelectorAll('.article-card');

        filterButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                // Update active button
                filterButtons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');

                const filter = btn.getAttribute('data-filter');

                articleCards.forEach(card => {
                    const category = card.getAttribute('data-category');

                    if (filter === 'all' || filter === category) {
                        card.classList.remove('hidden');
                        // Small timeout to trigger animation if needed
                        setTimeout(() => {
                            card.style.opacity = '1';
                            card.style.transform = 'translateY(0) scale(1)';
                        }, 10);
                    } else {
                        card.classList.add('hidden');
                        card.style.opacity = '0';
                        card.style.transform = 'scale(0.9)';
                    }
                });
            });
        });
    </script>
</body>
