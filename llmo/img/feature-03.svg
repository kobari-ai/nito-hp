<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 440" role="img" aria-label="収益起点での効果測定のイメージ">
  <defs>
    <linearGradient id="f3-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff8f0"/>
      <stop offset="1" stop-color="#fff1e0"/>
    </linearGradient>
    <linearGradient id="f3-hill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffd9a8"/>
      <stop offset="1" stop-color="#ffc77f"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="600" height="440" fill="url(#f3-bg)"/>

  <!-- hills -->
  <path d="M0 440 L0 360 Q120 300 260 340 Q420 386 600 320 L600 440 Z" fill="url(#f3-hill)" opacity="0.55"/>
  <path d="M0 440 L0 396 Q180 350 340 392 Q480 428 600 384 L600 440 Z" fill="#ffb86b" opacity="0.45"/>

  <!-- monitoring dashboard window -->
  <g>
    <rect x="92" y="76" width="324" height="256" rx="18" fill="#ffffff" stroke="#ffb86b" stroke-width="5"/>
    <!-- header bar -->
    <path d="M92 112 L416 112" stroke="#ffe3c2" stroke-width="4"/>
    <circle cx="118" cy="94" r="6" fill="#ff9f43"/>
    <circle cx="138" cy="94" r="6" fill="#ffb86b"/>
    <circle cx="158" cy="94" r="6" fill="#ffd9a8"/>

    <!-- chart axes -->
    <path d="M124 140 L124 290 L388 290" fill="none" stroke="#ffe3c2" stroke-width="4" stroke-linecap="round"/>

    <!-- area under the line -->
    <path d="M124 262 L172 240 L220 252 L268 206 L316 218 L372 162 L372 290 L124 290 Z"
          fill="#ffd9a8" opacity="0.45"/>
    <!-- revenue line (solid) -->
    <path d="M124 262 L172 240 L220 252 L268 206 L316 218 L372 162"
          fill="none" stroke="#ff8c00" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- data points -->
    <g fill="#e67e22">
      <circle cx="172" cy="240" r="7"/>
      <circle cx="220" cy="252" r="7"/>
      <circle cx="268" cy="206" r="7"/>
      <circle cx="316" cy="218" r="7"/>
      <circle cx="372" cy="162" r="7"/>
    </g>

    <!-- revenue chip -->
    <g>
      <rect x="138" y="146" width="92" height="40" rx="12" fill="#fff3e2"/>
      <path d="M158 156 L166 168 L174 156 M166 168 L166 178 M159 170 L173 170"
            fill="none" stroke="#e67e22" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M188 174 L196 162 L204 170 L216 156" fill="none" stroke="#ff8c00" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- clock = regular check -->
  <g>
    <circle cx="486" cy="150" r="46" fill="#ffffff" stroke="#ff9f43" stroke-width="10"/>
    <path d="M486 126 L486 152 L506 164" fill="none" stroke="#e67e22" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- cycle arrows = repeated monitoring -->
  <g stroke="#e67e22" stroke-width="8" stroke-linecap="round" fill="none">
    <path d="M452 268 A 38 38 0 1 1 446 308"/>
    <path d="M446 308 L432 296 M446 308 L462 300" stroke-linejoin="round"/>
  </g>

  <!-- sparkles -->
  <g fill="#ff9f43">
    <path d="M86 120 L92 136 L108 142 L92 148 L86 164 L80 148 L64 142 L80 136 Z"/>
    <path d="M200 52 L204 62 L214 66 L204 70 L200 80 L196 70 L186 66 L196 62 Z" opacity="0.8"/>
    <path d="M548 350 L553 363 L566 368 L553 373 L548 386 L543 373 L530 368 L543 363 Z" opacity="0.7"/>
  </g>
</svg>
