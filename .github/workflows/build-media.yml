name: Build media articles

on:
  push:
    branches: [main]
    paths:
      - "media/posts/**"
      - "media/_template/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install markdown

      - name: Build articles
        run: python3 media/_template/build.py

      - name: Commit generated files
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add media/ index.html sitemap.xml
          if git diff --cached --quiet; then
            echo "変更なし"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "build: 記事HTMLを自動生成"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Ping IndexNow (Bing / Yandex)
        if: steps.commit.outputs.changed == 'true'
        env:
          INDEXNOW_KEY: "4b4eb89eaf7b47989654e4d8de3e3c28"
        run: |
          python3 - <<'PY'
          import os, re, json, urllib.request
          key = os.environ["INDEXNOW_KEY"]
          host = "nito-0210.com"
          xml = open("sitemap.xml", encoding="utf-8").read()
          urls = re.findall(r"<loc>(.*?)</loc>", xml)
          payload = {
              "host": host,
              "key": key,
              "keyLocation": f"https://{host}/{key}.txt",
              "urlList": urls,
          }
          req = urllib.request.Request(
              "https://api.indexnow.org/indexnow",
              data=json.dumps(payload).encode(),
              headers={"Content-Type": "application/json; charset=utf-8"},
              method="POST",
          )
          try:
              with urllib.request.urlopen(req, timeout=30) as r:
                  print("IndexNow:", r.status, "submitted", len(urls), "urls")
          except Exception as e:
              print("IndexNow ping failed (非致命):", e)
          PY
